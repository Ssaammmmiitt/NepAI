name: update-stock-prices
on:
  schedule:
    - cron: "15 12 * * 1-5" # 6:00pm Nepal Time Mon-Fri
  workflow_dispatch:
defaults:
  run:
    working-directory: ./data_scraper
permissions:
  contents: write
jobs:
  update-stock-prices:
    name: update-stock-prices
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install packages
        run: pip install -r requirements.txt
      - name: Run updater
        run: python scrape_nepse.py
      - name: Setup Git
        run: git config --local user.email "github-actions[bot]@users.noreply.github.com" && git config --local user.name "github-actions[bot]"
      - name: Commit and push
        run: git add ../data && git diff --cached --quiet || (git commit -m "Update data" && git push)